<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Browser Soundboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-4xl bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700">
        <header class="flex flex-col md:flex-row justify-between items-center border-b border-slate-700 pb-6 mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-indigo-400">⚡ Retro Soundboard</h1>
                <p class="text-slate-400 text-sm mt-1">Click any pad to play. Adjust volume or kill audio instantly.</p>
            </div>
            
            <div class="flex items-center gap-6 bg-slate-850 p-3 rounded-xl border border-slate-700 w-full md:w-auto justify-between">
                <div class="flex items-center gap-3 flex-1 md:flex-none">
                    <span class="text-slate-400 text-sm font-medium">🔊 Volume</span>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5" 
                           class="w-32 h-2 bg-slate-750 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                    <span id="volumeLabel" class="text-xs font-mono text-slate-400 w-8 text-right">50%</span>
                </div>
                <button id="stopAllBtn" class="bg-rose-600 hover:bg-rose-500 active:scale-95 text-white font-semibold px-4 py-2 rounded-lg shadow transition-all duration-150 text-sm">
                    🛑 Stop All
                </button>
            </div>
        </header>

        <main id="soundboardGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
            </main>
    </div>

    <footer class="mt-8 text-slate-500 text-xs flex flex-col items-center gap-2">
        <p>Built with HTML5 Audio & Tailwind CSS</p>
        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" class="text-indigo-400 hover:underline flex items-center gap-1 font-medium text-sm bg-slate-800/50 px-3 py-1.5 rounded-full border border-slate-700">
            🎥 View Project Video Demo
        </a>
    </footer>

    <script src="script.js"></script>
</body>
</html>
